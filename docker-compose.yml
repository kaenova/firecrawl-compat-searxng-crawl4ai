services:
  proxy:
    build: .
    ports:
      - "3002:3002"
    environment:
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
      SCRAPE_TIMEOUT: 60
      POLL_INTERVAL: 1000
      ACTIVITY_DB_PATH: /app/data/activity.db
      WHOOGLE_ENDPOINT: http://whoogle:5000
      SEARCH_PRIORITY: whoogle,searxng
    volumes:
      - activity-db:/app/data
    depends_on:
      - searxng
      - crawl4ai
      - whoogle

  # Pre-configured SearXNG with JSON output
  # Source: https://github.com/kaenova/searxng-json-docker
  # Image:  https://hub.docker.com/r/kaenova/searxng-json/tags
  searxng:
    image: kaenova/searxng-json:latest
    ports:
      - "8080:8080"

  # Official Crawl4AI async crawler
  # Image: https://hub.docker.com/r/unclecode/crawl4ai
  crawl4ai:
    image: unclecode/crawl4ai:latest
    ports:
      - "11235:11235"

  # Self-hosted privacy-respecting Google proxy
  # Image: https://hub.docker.com/r/benbusby/whoogle-search
  whoogle:
    image: benbusby/whoogle-search:latest
    ports:
      - "5000:5000"

volumes:
  activity-db:
